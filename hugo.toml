baseURL = "https://jagdeep1.github.io/"
title = "Notes & Thoughts"
theme = "warm-editorial"

locale = "en-us"
enableGitInfo = true
enableRobotsTXT = true
canonifyURLs = true

[params]
  description = "Notes and thoughts on systems, software, and engineering."
  author = "Jagdeep"
  tagline = "Deep technical insights, delivered weekly."
  newsletterEnabled = false
  searchEnabled = false
  copyrightStart = 2026

  [[params.nav]]
    name = "Articles"
    url = "/posts/"

  [[params.nav]]
    name = "About"
    url = "/about/"

  [[params.social]]
    name = "GitHub"
    url = "https://github.com/jagdeep1"

  [[params.social]]
    name = "RSS"
    url = "/index.xml"

[taxonomies]
  tag = "tags"
  category = "categories"

[markup]
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNumbersInTable = false
    lineNos = false
    tabWidth = 2
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML"]
  term = ["HTML", "RSS"]

[pagination]
  pagerSize = 8

[minify]
  disableXML = true
  minifyOutput = true

[frontmatter]
  date = ["date", "publishDate", "lastmod"]
  lastmod = ["lastmod", ":git", "date", "publishDate"]
