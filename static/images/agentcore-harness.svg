<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="ac-title ac-desc">
  <title id="ac-title">AgentCore harness</title>
  <desc id="ac-desc">A diagram of AgentCore's managed harness. A top banner labeled AgentCore harness fans out to five component cards: Models, System prompt, Tools, AgentCore Memory, and Skills. Below sit three full-width infrastructure rows: AgentCore Runtime, AgentCore Identity, and AgentCore Observability.</desc>

  <style>
    .stroke-navy { stroke: #181715; fill: none; }
    .stroke-coral { stroke: #cc785c; fill: none; }
    .fill-coral { fill: #cc785c; }
    .h-banner {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 24px;
      font-weight: 500;
      letter-spacing: 0.16em;
      fill: #181715;
      text-anchor: middle;
    }
    .h-card {
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 21px;
      font-weight: 500;
      letter-spacing: 0.04em;
      fill: #181715;
      text-anchor: middle;
    }
    .h-row {
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 20px;
      font-weight: 500;
      letter-spacing: 0.05em;
      fill: #181715;
    }
    .b {
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 17px;
      font-weight: 400;
      fill: #3d3d3a;
    }
  </style>

  <!-- outer figure boundary (hairline) -->
  <rect x="0.5" y="0.5" width="1279" height="719" rx="14" ry="14"
        fill="none" stroke="#e6dfd8" stroke-width="1"/>

  <!-- top banner: AGENTCORE HARNESS -->
  <g>
    <rect x="20" y="20" width="1240" height="62" rx="10" ry="10"
          class="stroke-navy" stroke-width="1.25"/>
    <text class="h-banner" x="640" y="59">AGENTCORE HARNESS</text>
  </g>

  <!-- arrows from banner to each card -->
  <g stroke="#cc785c" stroke-width="1.25" fill="none">
    <!-- positions: card centers at x = 140, 390, 640, 890, 1140 -->
    <line x1="140" y1="84" x2="140" y2="118"/>
    <path d="M 134 112 L 140 122 L 146 112" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="390" y1="84" x2="390" y2="118"/>
    <path d="M 384 112 L 390 122 L 396 112" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="640" y1="84" x2="640" y2="118"/>
    <path d="M 634 112 L 640 122 L 646 112" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="890" y1="84" x2="890" y2="118"/>
    <path d="M 884 112 L 890 122 L 896 112" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="1140" y1="84" x2="1140" y2="118"/>
    <path d="M 1134 112 L 1140 122 L 1146 112" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- TOP ROW: 5 component cards -->
  <!-- card width 240, gap 10, margin 20 ->  20, 270, 520, 770, 1020 -->

  <!-- Card 1: Models -->
  <g>
    <rect x="20" y="125" width="240" height="245" rx="10" ry="10"
          class="stroke-navy" stroke-width="1.25"/>
    <text class="h-card" x="140" y="160">Models</text>
    <line x1="50" y1="178" x2="230" y2="178" stroke="#e6dfd8" stroke-width="1"/>
    <g class="b">
      <circle cx="42" cy="206" r="2.5" class="fill-coral"/>
      <text x="54" y="211">Bedrock</text>
      <circle cx="42" cy="234" r="2.5" class="fill-coral"/>
      <text x="54" y="239">Anthropic</text>
      <circle cx="42" cy="262" r="2.5" class="fill-coral"/>
      <text x="54" y="267">Open AI</text>
      <circle cx="42" cy="290" r="2.5" class="fill-coral"/>
      <text x="54" y="295">Gemini</text>
      <circle cx="42" cy="318" r="2.5" class="fill-coral"/>
      <text x="54" y="323">Any OpenAI-compatible</text>
      <text x="54" y="345">APIs</text>
    </g>
  </g>

  <!-- Card 2: System prompt -->
  <g>
    <rect x="270" y="125" width="240" height="245" rx="10" ry="10"
          class="stroke-navy" stroke-width="1.25"/>
    <text class="h-card" x="390" y="160">System prompt</text>
    <line x1="300" y1="178" x2="480" y2="178" stroke="#e6dfd8" stroke-width="1"/>
    <g class="b">
      <circle cx="292" cy="206" r="2.5" class="fill-coral"/>
      <text x="304" y="211">AGENTS.md</text>
      <circle cx="292" cy="234" r="2.5" class="fill-coral"/>
      <text x="304" y="239">system-prompt.md</text>
    </g>
  </g>

  <!-- Card 3: Tools -->
  <g>
    <rect x="520" y="125" width="240" height="245" rx="10" ry="10"
          class="stroke-navy" stroke-width="1.25"/>
    <text class="h-card" x="640" y="160">Tools</text>
    <line x1="550" y1="178" x2="730" y2="178" stroke="#e6dfd8" stroke-width="1"/>
    <g class="b">
      <circle cx="542" cy="206" r="2.5" class="fill-coral"/>
      <text x="554" y="211">MCP server</text>
      <circle cx="542" cy="234" r="2.5" class="fill-coral"/>
      <text x="554" y="239">AgentCore Gateway</text>
      <circle cx="542" cy="262" r="2.5" class="fill-coral"/>
      <text x="554" y="267">AgentCore Browser</text>
      <circle cx="542" cy="290" r="2.5" class="fill-coral"/>
      <text x="554" y="295">AgentCore Code</text>
      <text x="554" y="317">Interpreter</text>
      <circle cx="542" cy="340" r="2.5" class="fill-coral"/>
      <text x="554" y="345">Inline functions</text>
    </g>
  </g>

  <!-- Card 4: AgentCore Memory -->
  <g>
    <rect x="770" y="125" width="240" height="245" rx="10" ry="10"
          class="stroke-navy" stroke-width="1.25"/>
    <text class="h-card" x="890" y="160">AgentCore Memory</text>
    <line x1="800" y1="178" x2="980" y2="178" stroke="#e6dfd8" stroke-width="1"/>
    <g class="b">
      <circle cx="792" cy="206" r="2.5" class="fill-coral"/>
      <text x="804" y="211">Short-term</text>
      <circle cx="792" cy="234" r="2.5" class="fill-coral"/>
      <text x="804" y="239">Long-term</text>
    </g>
  </g>

  <!-- Card 5: Skills -->
  <g>
    <rect x="1020" y="125" width="240" height="245" rx="10" ry="10"
          class="stroke-navy" stroke-width="1.25"/>
    <text class="h-card" x="1140" y="160">Skills</text>
    <line x1="1050" y1="178" x2="1230" y2="178" stroke="#e6dfd8" stroke-width="1"/>
    <g class="b">
      <circle cx="1042" cy="206" r="2.5" class="fill-coral"/>
      <text x="1054" y="211">BYO Skills</text>
    </g>
  </g>

  <!-- BOTTOM ROWS: 3 infrastructure rows -->
  <!-- each row: full width, label on left, two columns of bullets -->

  <!-- Row 1: AgentCore Runtime  (y 400-470) -->
  <g>
    <rect x="20" y="400" width="1240" height="72" rx="10" ry="10"
          class="stroke-navy" stroke-width="1.25"/>
    <text class="h-row" x="40" y="442">AgentCore Runtime</text>
    <g class="b">
      <circle cx="450" cy="424" r="2.5" class="fill-coral"/>
      <text x="462" y="429">Firecracker MicroVM</text>
      <circle cx="450" cy="452" r="2.5" class="fill-coral"/>
      <text x="462" y="457">Persistent Filesystem</text>
      <circle cx="900" cy="438" r="2.5" class="fill-coral"/>
      <text x="912" y="443">Shell</text>
    </g>
  </g>

  <!-- Row 2: AgentCore Identity  (y 490-562) -->
  <g>
    <rect x="20" y="490" width="1240" height="72" rx="10" ry="10"
          class="stroke-navy" stroke-width="1.25"/>
    <text class="h-row" x="40" y="532">AgentCore Identity</text>
    <g class="b">
      <circle cx="450" cy="514" r="2.5" class="fill-coral"/>
      <text x="462" y="519">Inbound Authentication</text>
      <circle cx="450" cy="542" r="2.5" class="fill-coral"/>
      <text x="462" y="547">Outbound Authentication</text>
      <circle cx="900" cy="514" r="2.5" class="fill-coral"/>
      <text x="912" y="519">OAuth</text>
      <circle cx="900" cy="542" r="2.5" class="fill-coral"/>
      <text x="912" y="547">API keys</text>
    </g>
  </g>

  <!-- Row 3: AgentCore Observability  (y 580-652) -->
  <g>
    <rect x="20" y="580" width="1240" height="72" rx="10" ry="10"
          class="stroke-navy" stroke-width="1.25"/>
    <text class="h-row" x="40" y="622">AgentCore Observability</text>
    <g class="b">
      <circle cx="450" cy="604" r="2.5" class="fill-coral"/>
      <text x="462" y="609">CloudWatch traces</text>
      <circle cx="450" cy="632" r="2.5" class="fill-coral"/>
      <text x="462" y="637">Logs</text>
      <circle cx="900" cy="618" r="2.5" class="fill-coral"/>
      <text x="912" y="623">Metrics</text>
    </g>
  </g>
</svg>
