<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Anatomy of an agent harness</title>
  <desc id="desc">A diagram showing six clusters: a central iteration loop surrounded by Context and Memory at top, System Prompt at upper right, Tools and Skills at lower right, Sub-agents at lower left, and Safety at upper left.</desc>

  <style>
    .stroke-coral { stroke: #cc785c; fill: none; }
    .stroke-navy  { stroke: #181715; fill: none; }
    .fill-coral   { fill: #cc785c; }
    .label {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: 0.12em;
      fill: #181715;
      text-anchor: middle;
    }
    .label-loop {
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: 0.14em;
      fill: #181715;
      text-anchor: middle;
    }
  </style>

  <!-- hairline figure border -->
  <rect x="0.5" y="0.5" width="1279" height="719" rx="12" ry="12"
        fill="none" stroke="#e6dfd8" stroke-width="1"/>

  <!-- connector lines (drawn first so circles overlay them cleanly) -->
  <g stroke="#cc785c" stroke-width="1" stroke-opacity="0.35">
    <line x1="640" y1="190" x2="640" y2="300"/>
    <line x1="820" y1="321" x2="716" y2="355"/>
    <line x1="752" y1="534" x2="687" y2="445"/>
    <line x1="528" y1="534" x2="593" y2="445"/>
    <line x1="460" y1="321" x2="564" y2="355"/>
  </g>

  <!-- ITERATION LOOP (center) -->
  <g>
    <!-- inner faint circle -->
    <circle cx="640" cy="380" r="58" stroke="#cc785c" stroke-width="1" stroke-opacity="0.35" fill="none"/>
    <!-- main loop ring -->
    <circle cx="640" cy="380" r="80" stroke="#cc785c" stroke-width="1.75" fill="none"/>
    <!-- 3/4 directional arc on the outer ring -->
    <path d="M 640 296 A 84 84 0 1 1 556 380"
          stroke="#cc785c" stroke-width="1.75" fill="none" stroke-linecap="round"/>
    <!-- arrowhead at end of arc, tangent points up -->
    <path d="M 549 372 L 556 360 L 563 372 Z" fill="#cc785c"/>
    <!-- center label, two lines -->
    <text class="label-loop" x="640" y="376">ITERATION</text>
    <text class="label-loop" x="640" y="404">LOOP</text>
  </g>

  <!-- CONTEXT & MEMORY (top) -->
  <g>
    <circle cx="640" cy="140" r="50" class="stroke-navy" stroke-width="1.25"/>
    <!-- three stacked memory cells -->
    <rect x="622" y="124" width="36" height="8" rx="3" class="stroke-navy" stroke-width="1.25"/>
    <rect x="622" y="136" width="36" height="8" rx="3" class="stroke-navy" stroke-width="1.25"/>
    <rect x="622" y="148" width="36" height="8" rx="3" class="stroke-navy" stroke-width="1.25"/>
    <text class="label" x="640" y="218">CONTEXT &amp; MEMORY</text>
  </g>

  <!-- SYSTEM PROMPT (upper right) -->
  <g>
    <circle cx="868" cy="306" r="50" class="stroke-navy" stroke-width="1.25"/>
    <!-- three layered cards, slightly offset -->
    <rect x="852" y="294" width="32" height="10" rx="2" class="stroke-navy" stroke-width="1.25"/>
    <rect x="850" y="302" width="32" height="10" rx="2" class="stroke-navy" stroke-width="1.25"/>
    <rect x="848" y="310" width="32" height="10" rx="2" class="stroke-navy" stroke-width="1.25"/>
    <text class="label" x="868" y="384">SYSTEM PROMPT</text>
  </g>

  <!-- TOOLS & SKILLS (lower right) -->
  <g>
    <circle cx="781" cy="574" r="50" class="stroke-navy" stroke-width="1.25"/>
    <!-- crossed tool lines -->
    <line x1="766" y1="559" x2="796" y2="589" class="stroke-navy" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="766" y1="589" x2="796" y2="559" class="stroke-navy" stroke-width="1.5" stroke-linecap="round"/>
    <!-- tool tips -->
    <circle cx="766" cy="559" r="2.5" class="fill-coral"/>
    <circle cx="796" cy="589" r="2.5" class="fill-coral"/>
    <circle cx="766" cy="589" r="2.5" class="fill-coral"/>
    <circle cx="796" cy="559" r="2.5" class="fill-coral"/>
    <text class="label" x="781" y="652">TOOLS &amp; SKILLS</text>
  </g>

  <!-- SUB-AGENTS (lower left) -->
  <g>
    <circle cx="499" cy="574" r="50" class="stroke-navy" stroke-width="1.25"/>
    <!-- three agent nodes in triangle -->
    <circle cx="499" cy="560" r="4.5" class="fill-coral"/>
    <circle cx="487" cy="584" r="4.5" class="fill-coral"/>
    <circle cx="511" cy="584" r="4.5" class="fill-coral"/>
    <!-- subtle linkage triangle -->
    <path d="M 499 560 L 487 584 L 511 584 Z"
          stroke="#181715" stroke-width="1" stroke-opacity="0.4" fill="none"/>
    <text class="label" x="499" y="652">SUB-AGENTS</text>
  </g>

  <!-- SAFETY (upper left) -->
  <g>
    <circle cx="412" cy="306" r="50" class="stroke-navy" stroke-width="1.25"/>
    <!-- shield -->
    <path d="M 412 286 L 428 292 L 428 308 C 428 316 421 322 412 326 C 403 322 396 316 396 308 L 396 292 Z"
          class="stroke-navy" stroke-width="1.25" stroke-linejoin="round"/>
    <!-- inner check / divider -->
    <line x1="404" y1="302" x2="411" y2="309" class="stroke-navy" stroke-width="1.25" stroke-linecap="round"/>
    <line x1="411" y1="309" x2="422" y2="296" class="stroke-navy" stroke-width="1.25" stroke-linecap="round"/>
    <text class="label" x="412" y="384">SAFETY</text>
  </g>
</svg>
